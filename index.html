<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <title>3D Tic Tac Toe</title>
  <meta name="description" content="A mobile-friendly 3D Tic Tac Toe (3×3×3)." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app" role="application" aria-label="3D Tic Tac Toe">
    <header class="header">
      <div class="titleBlock">
        <h1>3D Tic Tac Toe</h1>
        <p class="subtitle">3×3×3 • two-player • phone-friendly</p>
      </div>
      <div class="actions">
        <button id="btnNew" class="btn">New game</button>
        <button id="btnReset" class="btn btn-secondary">Reset all</button>
      </div>
    </header>

    <section class="status" aria-live="polite">
      <div class="turn" id="turn">Loading…</div>
      <div class="score" aria-label="Score">
        <span class="pill">X: <strong id="scoreX">0</strong></span>
        <span class="pill">O: <strong id="scoreO">0</strong></span>
        <span class="pill">Draws: <strong id="scoreD">0</strong></span>
      </div>
    </section>

    <section class="controls" aria-label="View controls">
      <div class="seg">
        <button id="btn3d" class="segBtn" type="button">3D exploded</button>
        <button id="btnFlat" class="segBtn" type="button">Flat view</button>
      </div>
      <div id="layerTabs" class="layerTabs" aria-label="Layer selection">
        <button class="tab" data-layer="0" type="button">Layer 1</button>
        <button class="tab" data-layer="1" type="button">Layer 2</button>
        <button class="tab" data-layer="2" type="button">Layer 3</button>
      </div>
    </section>

    <section class="boardWrap">
      <div class="hint">
        <span class="dot"></span>
        <span>3D mode shows all 3 layers at once. Flat view focuses on one layer for easier tapping.</span>
      </div>
      <div id="stack" class="stack" aria-label="3D board stack"></div>
    </section>

    <footer class="footer">
      <p>iPhone: Safari → Share → <strong>Add to Home Screen</strong>.</p>
      <p class="muted">Static GitHub Pages app. Works offline after first load.</p>
    </footer>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
